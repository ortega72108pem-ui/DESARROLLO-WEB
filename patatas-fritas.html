<h1>Receta de patatas fritas</h1>

<img src="imagenes/patatas-fritas.jpg" width="300" height="225">

<h2>Ingredientes</h2>

<ul>
<li>3 papas</li>
<li>Aceite</li>
<li>Sal</li>
</ul>

<h2>Preparación</h2>

<ol>

<li>Pelar las papas</li>
<li>Cortarlas en tiras</li>
<li>Calentar el aceite</li>
<li>Freír las papas</li>
<li>Agregar sal</li>

</ol>
